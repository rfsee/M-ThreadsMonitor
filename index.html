 "thread_20260525_001", "author": "小美談戀愛", "handle": "love_xiaomei", "date": "2026-05-24 20:13", "timestamp": 1779624788, "text": "我男友昨天做了一件讓我很感動的事😭\n\n我最近工作壓力很大，每天回家都臭臉。昨天他默默煮了我最愛的麻辣鍋，還準備了我上次隨口說想喝的啤酒。\n\n吃完飯他把我抱在懷裡說：「辛苦了，不想說也沒關係，我在這邊。」\n\n當場直接噴淚😭😭😭\n\n有人也遇過這種暖男時刻嗎？\n\n#暖男 #男友 #情侶日常", "likes": 52300, "replies": 567, "url": "https://www.threads.net/@love_xiaomei/post/7986609136754748904", "category_hint": "案例分享", "top_comments": [{"author": "用戶4717", "text": "原po加油！你不是一個人💪", "likes": 741, "time_ago": "12小時前"}, {"author": "用戶6266", "text": "等你交往久了就知道了⋯⋯", "likes": 1687, "time_ago": "8小時前"}, {"author": "用戶3983", "text": "所以結論是什麼啦XD", "likes": 1216, "time_ago": "11小時前"}, {"author": "用戶2799", "text": "這根本在說我男友😂", "likes": 33, "time_ago": "2小時前"}, {"author": "用戶8828", "text": "笑死 太中肯了🤣", "likes": 1716, "time_ago": "9小時前"}], "category": "案例分享"}, {"id": "thread_20260525_009", "author": "遠距離生存指南", "handle": "ldr_survival", "date": "2026-05-20 05:37", "timestamp": 1779226628, "text": "分享我跟男友從遠距離到同居的過程💕\n\n台北-高雄遠距離兩年，每個月見一次面。\n\n那段時間真的很辛苦，每次分開都像失戀一次。\n\n但也是那段時間讓我們更確定彼此就是要走下去的人。\n\n今年終於一起在台中定居了！\n\n遠距離的大家加油！撐過去就是你的！\n\n#遠距離戀愛 #同居生活 #愛情故事", "likes": 45600, "replies": 723, "url": "https://www.threads.net/@ldr_survival/post/1443431376181856893", "category_hint": "案例分享", "top_comments": [{"author": "用戶7194", "text": "重點是溝通啦 不是誰對誰錯", "likes": 1753, "time_ago": "6小時前"}, {"author": "用戶2434", "text": "原po加油！你不是一個人💪", "likes": 76, "time_ago": "4小時前"}, {"author": "用戶5245", "text": "我男友完全相反欸XD", "likes": 1169, "time_ago": "1小時前"}, {"author": "用戶8668", "text": "完全認同！我也是這樣想的🙋", "likes": 1271, "time_ago": "12小時前"}, {"author": "用戶6332", "text": "這篇必須讓另一半看到", "likes": 414, "time_ago": "12小時前"}], "category": "案例分享"}, {"id": "thread_20260525_006", "author": "戀愛廢片", "handle": "love_reels", "date": "2026-05-24 14:40", "timestamp": 1779604808, "text": "真的推薦每個情侶都去玩這個「伴侶對話卡牌」！\n\n上週和男友試了一整盒，原本以為會很尷尬，結果聊到凌晨三點。\n\n有些問題是平常根本不會聊到的深度話題，像是「你覺得我們之間的安全感來自哪裡？」「你最害怕失去我的哪個面向？」\n\n玩完之後感覺感情變更好了，大推！\n\n#伴侶溝通 #情侶遊戲 r": "心理師艾蜜莉", "handle": "emily_psy", "date": "2026-05-23 04:13", "timestamp": 1779480788, "text": "只有我覺得情侶一定要每天聊天嗎？\n\n我朋友說他們情侶有時候一整天都不聯絡，但我覺得這樣很奇怪。\n\n我和男友就算再忙，至少睡前也會講個五分鐘電話或傳個訊息。\n\n每天聊天感情才會維持吧？還是大家覺得不用？\n\n#情侶日常 #感情觀念", "likes": 34500, "replies": 1800, "url": "https://www.threads.net/@emily_psy/post/8727542309764527484", "category_hint": "觀點爭論", "top_comments": [{"author": "用戶5386", "text": "原po加油！你不是一個人💪", "likes": 1812, "time_ago": "9小時前"}, {"author": "用戶7416", "text": "感同身受⋯⋯我家的也是這樣", "likes": 926, "time_ago": "3小時前"}, {"author": "用戶4890", "text": "笑死 太中肯了🤣", "likes": 1077, "time_ago": "4小時前"}, {"author": "用戶4901", "text": "第一點就中了 該放生嗎QQ", "likes": 67, "time_ago": "9小時前"}, {"author": "用戶2766", "text": "不同意耶，每對情侶狀況不一樣吧", "likes": 77, "time_ago": "11小時前"}], "category": "觀點爭論"}, {"id": "thread_20260525_014", "author": "感情諮商室", "handle": "love_counsel", "date": "2026-05-18 21:59", "timestamp": 1779112748, "text": "分享一下我的奇葩相親經驗😂\n\n對方一坐下來就問我月薪多少、有沒有房子、婚後要不要跟公婆住。\n\n我：我們可以先自我介紹一下嗎？\n他：那些不重要，先確認價值觀合不合。\n\n我心想我連你叫什麼名字都不知道欸大哥！\n\n#相親 #奇葩經驗 #單身萬歲", "likes": 34100, "replies": 1500, "url": "https://www.threads.net/@love_counsel/post/2686743566766613480", "category_hint": "抱怨", "top_comments": [{"author": "用戶6592", "text": "已收藏！感謝分享❤️", "likes": 1757, "time_ago": "10小時前"}, {"author": "用戶9948", "text": "第一點就中了 該放生嗎QQ", "likes": 1869, "time_ago": "2小時前"}, {"author": "用戶5822", "text": "笑死 太中肯了🤣", "likes": 1314, "time_ago": "9小時前"}, {"author": "用戶1184", "text": "講得好好 被療癒到了🥺", "likes": 1269, "time_ago": "10小時前"}, {"author": "用戶8936", "text": "原po加油！你不是一個人💪", "likes": 1641, "time_ago": "3小時前"}], "category": "抱怨"}, {"id": "thread_20260525_004", "author": "台北愛情故事", "handle": "taipei_love", "date": "2026-05-22 14:03", "timestamp": 1779429788, "text": "有人也覺得交往久了節日就不重要了嗎？\n\n和男友在一起五年，他去年忘記七夕，今年忘記情人節，還說「我們不需要用節日來證明感情」。\n\n雖然理性上知道他說的有道理，但感性上還是會失望⋯⋯\n\n是不是我太在意儀式感了？\n\n#節日儀式感 #情侶日常 #感情問題", "likes": 29100, "replies": 1300, "url": "https://www.threads.net/@taipei_love/post/8778653072210136263", "category_hint": "抱怨", "top_comments": [{"author": "用戶8361", "text": "求後續！！！！", "likes": 662, "time_ago": "4小時前"}, {"author": "用戶6617", "text": "等你交往久了就知道了⋯⋯", "likes": 1640, "time_ago": "4小時前"}, {"author": "用戶1379", "text": "笑死 太中肯了🤣", "likes": 137, "time_ago": "2小時前"}, {"author": "用戶5270", "text": "第一點就中了 該放生嗎QQ", "likes": 1350, "time_ago": "12小時前"}, {"author": "用戶7738", "text": "完全認同！我也是這樣想的🙋", "likes": 1779, "time_ago": "6小時前"}], "category": "抱怨"}, {"id": "thread_20260525_013", "author": "約會美食地圖", "handle": "date_food_map", "date": "2026-05-23 20:04", "timestamp": 1779537848, "text": "受不了男友每次打電動就消失\n\n已經講過好幾次了，每次說「再五分鐘」然後兩小時過去了。\n\n傳訊息不讀不回，打電話也不接，等他打完了才跑來說「寶貝我錯了」。\n\n我真的心好累，是不是所有男生都這樣？\n\n#抱怨男友 #電動廢人 #情侶吵架", "likes": 28900, "replies": 2100, "url": "https://www.threads.net/@date_food_map/post/1207845619206479573", "category_hint": "抱怨", "top_comments": [{"author": "用戶7380", "text": "重點是溝通啦 不是誰對誰錯", "likes": 1258, "time_ago": "9小時前"}, {"author": "用戶2416", "text": "這篇必須讓另一半看到", "likes": 951, "time_ago": "7小時前"}, {"author": "用戶3309", "text": "已收藏！感謝分享❤️", "likes": 1703, "time_ago": "10小時前"}, {"author": "用戶2426", "text": "我男友完全相反欸XD", "likes": 1048, "time_ago": "6小時前"}, {"author": "用戶4461", "text": "笑死 太中肯了🤣", "likes": 1961, "time_ago": "12小時前"}], "category": "抱怨"}, {"id": "thread_20260525_005", "author": "心理師艾蜜莉", "handle": "emily_psy", "date": "2026-05-22 04:21", "timestamp": 1779394868, "text": "大家覺得伴侶之間應該要有共同興趣嗎？\n\n我和男友的興趣完全不同，我喜歡看展覽、看電影，他喜歡打球、打電動。\n\n有人說這樣互補比較好，有人說沒有共同話題很危險。\n\n我自己是覺得各自有空間也不錯啦，大家怎麼看？\n\n#感情討論 #情侶興趣", "likes": 25600, "replies": 1100, "url": "https://www.threads.net/@emily_psy/post/9782811920310350105", "category_hint": "觀點爭論", "top_comments": [{"author": "用戶5026", "text": "等你交往久了就知道了⋯⋯", "likes": 260, "time_ago": "11小時前"}, {"author": "用戶8883", "text": "講得好好 被療癒到了🥺", "likes": 1858, "time_ago": "6小時前"}, {"author": "用戶9514", "text": "這篇必須讓另一半看到", "likes": 1452, "time_ago": "11小時前"}, {"author": "用戶1220", "text": "這什麼求生慾笑爛🤣", "likes": 377, "tim // Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
  });
});

// Punchlines
const punchlineContainer = document.getElementById('punchlineContainer');
DATA.punchlines.forEach(pl => {
  const div = document.createElement('div');
  div.className = 'punchline-card';
  div.innerHTML = `<div class="punchline-text">\u201c${pl.text}\u201d</div><div class="punchline-source">\u2014 ${pl.source} &middot; &#10084; ${pl.likes?.toLocaleString()}</div>`;
  punchlineContainer.appendChild(div);
});

// Topic horizontal bar chart (sorted descending)
const dist = DATA.topicDistribution;
const sortedDist = Object.entries(dist).sort((a,b) => b[1] - a[1]);
new Chart(document.getElementById('topicBarChart'), {
  type: 'bar',
  data: {
    labels: sortedDist.map(([k]) => k),
    datasets: [{
      data: sortedDist.map(([,v]) => v),
      backgroundColor: ['#e74c3c','#fd79a8','#fdcb6e','#00b894','#6c5ce7','#0984e3','#636e72'],
      borderRadius: 4,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:true, indexAxis:'y',
    plugins:{ legend:{ display:false } },
    scales:{ x:{ ticks:{ stepSize:1 } } }
  }
});

// Likes bar chart (author | first 15 chars)
const sorted = [...DATA.posts].sort((a,b) => b.likes - a.likes).slice(0,10);
const labels = sorted.map(p => (p.author || '\u533f\u540d') + ' | ' + (p.text||'').slice(0,15).replace(/\n/g,' ') + '\u22ef');
new Chart(document.getElementById('likesBarChart'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: '\u8b9a\u6578',
      data: sorted.map(p => p.likes),
      backgroundColor: '#e74c3c',
      borderRadius: 4,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:true, indexAxis:'y',
    plugins:{ legend:{ display:false } },
    scales:{ x:{ ticks:{ callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v } } },
    font:{ size:10 }
  }
});

// Topic summaries
const topicContainer = document.getElementById('topicContainer');
DATA.topicSummaries.forEach(s => {
  const div = document.createElement('div');
  div.className = 'topic-card';
  div.innerHTML = `<div class="topic-title">&#128204; ${s.topic} <span class="topic-meta">（${s.post_count} 則 · &#10084; ${s.total_likes?.toLocaleString()}）</span></div><div class="topic-summary">${s.summary}</div>`;
  topicContainer.appendChild(div);
});

// Filters
const filterContainer = document.getElementById('filterContainer');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = '全部';
allBtn.dataset.filter = 'all';
filterContainer.appendChild(allBtn);
const topics = [...new Set(DATA.posts.map(p => p.category || p.category_hint || '其他'))];
topics.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = t;
  btn.dataset.filter = t;
  filterContainer.appendChild(btn);
});

let currentFilter = 'all';
function renderPosts() {
  const filtered = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const container = document.getElementById('postListContainer');
  container.innerHTML = filtered.map((p,i) => `
    <div class="post-card">
      <h4>&#128100; ${p.author || '匿名'} <span class="meta">@${p.handle||''} &middot; ${p.date||''}</span></h4>
      <div class="text" onclick="this.classList.toggle('expanded')">${p.text}</div>
      <div class="stats">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies} &middot; ${p.category || p.category_hint || '未分類'}</div>
      ${p.url ? '<a class="post-url" href="' + p.url + '" target="_blank" rel="noopener">&#128279; 前往原文</a>' : ''}
    </div>
  `).join('');
  // Update select
  const sel = document.getElementById('postSelect');
  sel.innerHTML = filtered.map((p,i) => `<option value="${i}">&#10084;${p.likes} | ${p.author||'匿名'} | ${(p.text||'').slice(0,30)}...</option>`).join('');
  sel.onchange = () => showDetail(parseInt(sel.value));
}

filterContainer.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderPosts();
  });
});

function showDetail(idx) {
  const posts = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const p = posts[idx];
  if (!p) return;
  const container = document.getElementById('detailContainer');
  let comments = '';
  (p.top_comments || []).forEach(c => {
    comments += `<div class="comment"><div class="comment-author">${c.author||'匿名'}</div><div>${c.text}</div><div style="font-size:0.75rem;color:#999;">&#10084; ${c.likes}</div></div>`;
  });
  container.innerHTML = `
    <div class="detail-container">
      <h3>&#128100; ${p.author||'匿名'} <span style="font-weight:400;color:#999;">@${p.handle||''}</span></h3>
      <div style="font-size:0.8rem;color:#999;">${p.date||''} &middot; ${p.category||p.category_hint||'未分類'}</div>
      <div class="text">${p.text}</div>
      <div style="color:#e74c3c;font-size:0.9rem;">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies}</div>
      ${p.url ? '<a class="post-url" href="' + p.url + '" target="_blank" rel="noopener">&#128279; 前往 Threads 原文</a>' : ''}
      <div style="margin-top:0.8rem;font-weight:600;color:#666;">&#128172; 熱門留言（前 ${(p.top_comments||[]).length} 則）</div>
      ${comments || '<div style="color:#999;">暫無留言資料</div>'}
    </div>
  `;
}

renderPosts();
showDetail(0);
</script>
