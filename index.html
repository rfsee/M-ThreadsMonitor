爭論"}, {"id": "thread_20260523_015", "author": "大學生戀愛", "handle": "college_love", "date": "2026-05-23 08:21", "timestamp": 1779495684, "text": "我男友昨天做了一件讓我很感動的事😭\n\n我最近工作壓力很大，每天回家都臭臉。昨天他默默煮了我最愛的麻辣鍋，還準備了我上次隨口說想喝的啤酒。\n\n吃完飯他把我抱在懷裡說：「辛苦了，不想說也沒關係，我在這邊。」\n\n當場直接噴淚😭😭😭\n\n有人也遇過這種暖男時刻嗎？\n\n#暖男 #男友 #情侶日常", "likes": 52300, "replies": 567, "url": "https://www.threads.net/@college_love/post/8370593569855122366", "category_hint": "案例分享", "top_comments": [{"author": "用戶3850", "text": "第一點就中了 該放生嗎QQ", "likes": 1275, "time_ago": "12小時前"}, {"author": "用戶5939", "text": "已收藏！感謝分享❤️", "likes": 865, "time_ago": "5小時前"}, {"author": "用戶7539", "text": "感同身受⋯⋯我家的也是這樣", "likes": 1414, "time_ago": "6小時前"}, {"author": "用戶4303", "text": "這篇必須讓另一半看到", "likes": 564, "time_ago": "6小時前"}, {"author": "用戶4421", "text": "但也要看雙方能不能互相理解吧", "likes": 771, "time_ago": "11小時前"}], "category": "案例分享"}, {"id": "thread_20260523_001", "author": "小美談戀愛", "handle": "love_xiaomei", "date": "2026-05-17 20:02", "timestamp": 1779019344, "text": "分享我跟男友從遠距離到同居的過程💕\n\n台北-高雄遠距離兩年，每個月見一次面。\n\n那段時間真的很辛苦，每次分開都像失戀一次。\n\n但也是那段時間讓我們更確定彼此就是要走下去的人。\n\n今年終於一起在台中定居了！\n\n遠距離的大家加油！撐過去就是你的！\n\n#遠距離戀愛 #同居生活 #愛情故事", "likes": 45600, "replies": 723, "url": "https://www.threads.net/@love_xiaomei/post/3964678404380645662", "category_hint": "案例分享", "top_comments": [{"author": "用戶8467", "text": "等你交往久了就知道了⋯⋯", "likes": 893, "time_ago": "4小時前"}, {"author": "用戶9699", "text": "完全認同！我也是這樣想的🙋", "likes": 1737, "time_ago": "2小時前"}, {"author": "用戶2622", "text": "好甜喔我要瞎了👓", "likes": 252, "time_ago": "1小時前"}, {"author": "用戶7309", "text": "已收藏！感謝分享❤️", "likes": 817, "time_ago": "12小時前"}, {"author": "用戶7181", "text": "不同意耶，每對情侶狀況不一樣吧", "likes": 702, "time_ago": "10小時前"}], "category": "案例分享"}, {"id": "thread_20260523_009", "author": "遠距離生存指南", "handle": "ldr_survival", "date": "2026-05-21 19:48", "timestamp": 1779364104, "text": "真的推薦每個情侶都去玩這個「伴侶對話卡牌」！\n\n上週和男友試了一整盒，原本以為會很尷尬，結果聊到凌晨三點。\n\n有些問題是平常根本不會聊到的深度話題，像是「你覺得我們之間的安全感來自哪裡？」「你最害怕失去我的哪個面向？」\n\n玩完之後感覺感情變更好了，大推！\n\n#伴侶溝通 #情侶遊戲 #好感度提升", "likes": 45200, "replies": 892, "url": "https://www.threads.net/@ldr_survival/post/7958300179765814430", "category_hint": "工具推薦", "top_comments": [{"author": "用戶3220", "text": "這什麼求生慾笑爛🤣", "likes": 1461, "time_ago": "1小時前"}, {"author": "用戶3258", "text": "這篇必須讓另一半看到", "likes": 1227, "time_ago": "5小時前"}, {"author": "用戶8910", "text": "完全認同！我也是這樣想的🙋", "likes": 1766, "time_ago": "10小時前"}, {"author": "用戶7876", "text": "我男友完全相反欸XD", "likes": 1079, "time_ago": "11小時前"}, {"author": "用戶2906", "text": "求後續！！！！", "likes": 1385, "time_ago": "9小時前"}], "category": "工具推薦"}, {"id": "thread_20260523_013", "author": "約會美食地圖", "handle": "date_food_map", "date": "2026-05-22 15:17", "timestamp": 1779434244, "text": "我該不該原諒男友騙我？\n\n他跟我說去加班，結果被我朋友看到在酒吧。事後他解釋是同事臨時約的，怕我生氣所以說謊。\n\n不是什麼嚴重的事，但信任感一旦有裂痕就很難修補。\n\n大家覺得這種小謊言可以原諒嗎？\n\n#感情問題 #信任 #情侶", "likes": 41200, "replies": 2800, "url": "https://www.threads.net/@date_food_map/post/4687678211833817229", "category_hint": "求助請益", "top_comments": [{"author": "用戶1746", "text": "這篇必須讓另一半看到", "likes": 2000, "time_ago": "6小時前"}, {"author": "用戶1874", "text": "第一點就中了 該放生嗎QQ", "likes": 1443, "time_ago": "3小時前"}, {"author": "用戶5798", "text": "真的！說到我心坎裡了", "likes": 1080, "time_ago": "4小時前"}, {"author": "用戶2291", "text": "已收藏！感謝分享❤️", "likes": 927, "time_ago": "1小時前"}, {"author": "用戶2723", "text": "笑死 太中肯了🤣", "likes": 1473, "time_ago": "7小時前"}], "category": "求助請益"}, {"id": "thread_20260523_003", "author": "男友使用手冊", "handle": "bf_manual", "date": "2026-05-21 02:09", "timestamp": 1779300564, "text": "大家覺得男生一定要有車才能交到女朋友嗎？\n\n我目前25歲，在台北工作，平時都搭捷運或ubike，生活圈也很方便，但一直被家人說沒車交不到女友。\n\n可是我自己也是女生，我反而覺得會開車沒什麼，重點是個性合不合吧？\n\n想聽聽大家的想法！\n\n#感情問題 #交往條件", "likes": 38700, "replies": 1240, "url": "https://www.threads.net/@bf_manual/post/8693110066444105547", "category_hint": "觀點爭論", "top_comments": [{"author": "用戶4343", "text": "重點是溝通啦 不是誰對誰錯", "likes": 1814, "time_ago": "2小時前"}, {"author": "用戶1496", "text": "感同身受⋯⋯我家的也是這樣", "likes": 234, "time_ago": "11小時前"}, {"author": "用戶5547", "text": "你脾氣也太好 我早翻桌了", "likes": 652, "time_ago": "7小時前"}, {"author": "用戶3369", "text": "原po加油！你不是一個人💪", "likes": 1668, "time_ago": "1小時前"}, {"author": "用戶9320", "text": "已收藏！感謝分享❤️", "likes": 1060, "time_ago": "5小時前"}], "category": "觀點爭論"}, {"id": "thread_20260523_010", "author": "曖昧讓人受委屈", "handle": "ambiguous_af", "date": "2026-05-19 13:24", "timestamp": 1779168264, "text": "遠距離戀愛維持的 5 個小技巧 ✨\n\n1. 每天固定時間視訊（不要只是打字）\n2. 一起看劇或玩遊戲（共享體驗）\n3. 寄實體信件或小禮物（驚喜感）\n4. 規劃下次見面的行程（期待感）\n5. 坦誠溝通不安和感受\n\n走過兩年遠距的我真心分享！\n\n#遠距離 #戀愛技巧 #經驗分享", "likes": 38700, "replies": 645, "url": "https://www.threads.net/@ambiguous_af/post/2311626740856278465", "category_hint": "工具推薦", "top_comments": [{"author": "用戶7782", "text": "我男友完全相反欸XD", "likes": 1937, "time_ago": "1小時前"}, {"author": "用戶4021", "text": "但也要看雙方能不能互相理解吧", "likes": 1610, "time_ago": "2小時前"}, {"author": "用戶1377", "text": "我也有經歷過 最後分手了😢", "likes": 1076, "time_ago": "8小時前"}, {"author": "用戶6838", "text": "原po加油！你不是一個人💪", "likes": 70, "time_ago": "12小時前"}, {"author": "用戶2823", "text": "這什麼求生慾笑爛🤣", "likes": 651, "time_ago": "10小時前"}], "category": "工具推薦"}, {"id": "thread_20260523_019", "author": "台北愛情故事", "handle": "taipei_love", "date": "2026-05-19 11:07", "timestamp": 1779160044, "text": "幫朋友問：發現男友跟女同事單獨吃宵夜，該生氣嗎？\n\n她男友說是同事剛好下班遇到，就一起去吃了。\n\n但女生覺得不太舒服，又怕自己太小氣。\n\n大家覺得這樣是正常的社交還是該注意？\n\n#感情問題 #情侶界線 #求助", "likes": 36800, "replies": 1900, "url": "https://www.threads.net/@taipei_love/post/2169503884202091009", "category_hint": "求助請益", "top_comments": [{"author": "用戶2717", "text": "等你交往久了就知道了⋯⋯", "likes": 60, "time_ago": "7小時前"}, {"author": "用戶3989", "text": "我也有經歷過 最後分手了😢", "likes": 408, "time_ago": "5小時前"}, {"author": "用戶9204", "text": "好羨慕喔 我也想要這樣的感情", "likes": 622, "time_ago": "3小時前"}, {"author": "用戶3586", "text": "重點是溝通啦 不是誰對誰錯", "likes": 341, "time_ago": "4小時前"}, {"author": "用戶1405", "text": "第一點就中了 該放生嗎QQ", "likes": 213, "time_ago": "7小時前"}], "category": "求助請益"}, {"id": "thread_20260523_016", "author": " document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
  });
});

// Pie chart
new Chart(document.getElementById('pieChart'), {
  type: 'pie',
  data: {
    labels: Object.keys(DATA.topicDistribution),
    datasets: [{
      data: Object.values(DATA.topicDistribution),
      backgroundColor: ['#e74c3c','#fd79a8','#fdcb6e','#00b894','#6c5ce7','#0984e3','#636e72'],
    }]
  },
  options: { responsive:true, maintainAspectRatio:true, plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 } } } } }
});

// Bar chart (top likes)
const sorted = [...DATA.posts].sort((a,b) => b.likes - a.likes).slice(0,10);
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: sorted.map(p => p.author || '匿名'),
    datasets: [{
      label: '讚數',
      data: sorted.map(p => p.likes),
      backgroundColor: '#e74c3c',
      borderRadius: 4,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:true, indexAxis:'y',
    plugins:{ legend:{ display:false } },
    scales:{ x:{ ticks:{ callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v } } }
  }
});

// Topic summaries
const topicContainer = document.getElementById('topicContainer');
DATA.topicSummaries.forEach(s => {
  const div = document.createElement('div');
  div.className = 'topic-card';
  div.innerHTML = `<div class="topic-title">&#128204; ${s.topic} <span class="topic-meta">（${s.post_count} 則 · &#10084; ${s.total_likes?.toLocaleString()}）</span></div><div class="topic-summary">${s.summary}</div>`;
  topicContainer.appendChild(div);
});

// Filters
const filterContainer = document.getElementById('filterContainer');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = '全部';
allBtn.dataset.filter = 'all';
filterContainer.appendChild(allBtn);
const topics = [...new Set(DATA.posts.map(p => p.category || p.category_hint || '其他'))];
topics.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = t;
  btn.dataset.filter = t;
  filterContainer.appendChild(btn);
});

let currentFilter = 'all';
function renderPosts() {
  const filtered = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const container = document.getElementById('postListContainer');
  container.innerHTML = filtered.map((p,i) => `
    <div class="post-card">
      <h4>&#128100; ${p.author || '匿名'} <span class="meta">@${p.handle||''} &middot; ${p.date||''}</span></h4>
      <div class="text" onclick="this.classList.toggle('expanded')">${p.text}</div>
      <div class="stats">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies} &middot; ${p.category || p.category_hint || '未分類'}</div>
    </div>
  `).join('');
  // Update select
  const sel = document.getElementById('postSelect');
  sel.innerHTML = filtered.map((p,i) => `<option value="${i}">&#10084;${p.likes} | ${p.author||'匿名'} | ${(p.text||'').slice(0,30)}...</option>`).join('');
  sel.onchange = () => showDetail(parseInt(sel.value));
}

filterContainer.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderPosts();
  });
});

function showDetail(idx) {
  const posts = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const p = posts[idx];
  if (!p) return;
  const container = document.getElementById('detailContainer');
  let comments = '';
  (p.top_comments || []).forEach(c => {
    comments += `<div class="comment"><div class="comment-author">${c.author||'匿名'}</div><div>${c.text}</div><div style="font-size:0.75rem;color:#999;">&#10084; ${c.likes}</div></div>`;
  });
  container.innerHTML = `
    <div class="detail-container">
      <h3>&#128100; ${p.author||'匿名'} <span style="font-weight:400;color:#999;">@${p.handle||''}</span></h3>
      <div style="font-size:0.8rem;color:#999;">${p.date||''} &middot; ${p.category||p.category_hint||'未分類'}</div>
      <div class="text">${p.text}</div>
      <div style="color:#e74c3c;font-size:0.9rem;">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies}</div>
      <div style="margin-top:0.8rem;font-weight:600;color:#666;">&#128172; 熱門留言（前 ${(p.top_comments||[]).length} 則）</div>
      ${comments || '<div style="color:#999;">暫無留言資料</div>'}
    </div>
  `;
}

renderPosts();
showDetail(0);
</script>
</body>
</html>
