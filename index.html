6", "date": "2026-05-18", "timestamp": 1780117091, "text": "2026-5-18\n戀愛要從收到一束鮮花和正式的告白開始", "likes": 2152, "replies": 14, "url": "https://www.threads.com/@nnn_06026/post/DYeyynoE9Db", "top_comments": [], "engagement": 2166, "category": "其他"}, {"id": "ts_1780116852_182", "author": "2026-5-18", "handle": "baby_152_", "date": "2026-05-18", "timestamp": 1780116852, "text": "2026-5-18\n感情裡很多爭吵\n其實都不是因為事情本身真的多嚴重\n而是當下那種「不被理解」的感覺太強烈了！\n或許比起急著解決問題、講道理、爭對錯\n接住情緒也很重要‼️\n人在情緒上來的時候 其實很難好好思考\n有時候要的不一定是立刻給出答案\n而是願不願意停下來聽對方說、理解他\n但也不能只停留在安撫情緒\n如果每次都只是哄一哄、抱一抱\n問題沒有真正去解決\n那事情絕對會重蹈覆徹🤯\n-\n「先理解彼此的感受再一起面對問題」\n不是把對方當成敵人去爭輸贏\n而是即使有情緒、有摩擦\n還是願意站在同一邊好好把事情走過去！\n🙋我自己在情緒上來會默默告訴自己：\n「現在的情緒是真的，但不代表現在說出口的話都會是自己真正想表達的。」\n因為很多時候人在情緒裡講出來的話\n其實只是想被理解 不是真的想傷害對方\n等自己稍微冷靜一點之後\n再回來好好對談 很多事情真的會差很多🫂\n這也只是我自己一路相處下來 慢慢學到的🥺", "likes": 1689, "replies": 193, "url": "https://www.threads.com/@baby_152_/post/DYewj91mAAr", "top_comments": [], "engagement": 1882, "category": "觀點爭論"}, {"id": "ts_1780117190_493", "author": "2026-5-18", "handle": "125_jjk", "date": "2026-05-18", "timestamp": 1780117190, "text": "2026-5-18\n我收回以前覺得cortis整團很直男的話\n安乾鎬越看越不直\n如果金主訓是同志天菜的話（超多男粉 男粉可以跟我解釋為什麼嗎 好好奇）\n哇⋯⋯\n哇⋯⋯\n🙈", "likes": 1761, "replies": 45, "url": "https://www.threads.com/@125_jjk/post/DYdd95UE_yI", "top_comments": [], "engagement": 1806, "category": "觀點爭論"}, {"id": "ts_1780117134_801", "author": "天蠍座", "handle": "gaga.mandala.art", "date": "2026-05-11", "timestamp": 1780117134, "text": "天蠍座\n2026-5-11\n真心勸各位想跟天蠍女交往的男人們😉\n如果她真的愛你，她會自動把全世界男人調成靜音模式📵\n不是因為沒人追\n是因為她眼裡只剩你 👀\n但你要知道，跟天蠍女談戀愛\n某種程度也像在養一隻：\n平常很獨立的貓🐱\n偶爾黏人的狗🐶\n半夜突然emo的水鬼👻\n再加一個靈魂觀察家🔍\n強烈建議你必須好好理解：\n* 她突然安靜，不一定是不愛了，是在內耗\n* 她突然很兇，有時只是太在乎\n* 她嘴巴說沒事，其實已經腦補到第八季\n* 她平常很強，但偶爾也會脆弱到像水做的非常愛哭\n* 她會默默觀察你所有細節，你騙不了她🤫\n* 她會一直進步，所以沒目標、沒責任感的人會被她越甩越遠\n* 她談戀愛很專一，但一失望也是直接火化🔥\n還有一點很重要：\n不要讓天蠍女長期「失望」\n因為她不是不會離開，\n她只是會忍很久很久。\n但一旦心死，\n你會像沒存在過一樣。😌\n還有嗎？ 🫥🫥🫥", "likes": 1510, "replies": 167, "url": "https://www.threads.com/@gaga.mandala.art/post/DYMCTwqE471", "top_comments": [], "engagement": 1677, "category": "抱怨"}, {"id": "ts_1780117190_496", "author": "beverly.zip", "handle": "beverly.zip", "date": "2026-05-30", "timestamp": 1780117190, "text": "6天\n直男逼面霜红色这个就是对敏感肌修复的没有提拉作用 紫色这个才是紧致提拉宝宝们别买错了", "likes": 1538, "replies": 76, "url": "https://www.threads.com/@beverly.zip/post/DYq9uo0EckZ", "top_comments": [], "engagement": 1614, "category": "其他"}, {"id": "ts_1780117104_608", "author": "前任", "handle": "libro0201", "date": "2026-05-16", "timestamp": 1780117104, "text": "前任\n2026-5-16\n要怎麼才能夠不去在意男友的前任🥴\n他跟前任在一起快12年了吧\n甚至兩個應該都是有考慮過結婚的⋯", "likes": 1280, "replies": 132, "url": "https://www.threads.com/@libro0201/post/DYY2UqQAHnI", "top_comments": [], "engagement": 1412, "category": "其他"}, {"id": "ts_1780117020_683", "author": "射手女", "handle": "mo00n___1", "date": "2026-05-21", "timestamp": 1780117020, "text": "射手女\n2026-5-21\n對射手女有什麼想抱怨的（這邊請）\n中立判斷回覆、開導🧏🏻‍♀️🤦🏼‍♀️\n本人11月的", "likes": 833, "replies": 508, "url": "https://www.threads.com/@mo00n___1/post/DYmTghCCckM", "top_comments": [], "engagement": 1341, "category": "其他"}, {"id": "ts_1780116964_106", "author": "2026-5-14", "handle": "bam_gyugyuu", "date": "2026-05-14", "timestamp": 1780116964, "text": "2026-5-14\n不好意思 請問這兩個人是情侶嗎><", "likes": 1248, "replies": 17, "url": "https://www.threads.com/@bam_gyugyuu/post/DYUnoLnkSdZ", "top_comments": [], "engagement": 1265, "category": "求助請益"}, {"id": "ts_1780117104_629", "author": "tinglien_yayayaya", "handle": "tinglien_yayayaya", "date": "2026-05-30", "timestamp": 1780117104, "text": "2天\n不知道鄭宇的前男友看到為了拯救🥣☀️而分手的前男友被上萬則訊息騷擾轟炸有什麼想法🤔", "likes": 1244, "replies": 15, "url": "https://www.threads.com/@tinglien_yayayaya/post/DY3VM0wE9DE", "top_comments": [], "engagement": 1259, "category": "其他"}, {"id": "ts_1780117190_767", "author": "2026-5-18", "handle": "ddddownbad", "date": "2026-05-18", "timestamp": 1780117190, "text": "2026-5-18\n我就觉得这个直男比面霜用了之后每天早上起来捏不起来脸上的肉了。那种肉扒脸上的感觉。", "likes": 1166, "replies": 85, "url": "https://www.threads.com/@ddddownbad/post/DYdqFkMFIh6", "top_comments": [], "engagement": 1251, "category": "其他"}, {"id": "ts_1780117162_852", "author": "2026-5-19", "handle": "joey_wang.16", "date": "2026-05-19", "timestamp": 1780117162, "text": "2026-5-19\n單身太久\n有人可以用男朋友的口氣\n跟我說話一句話嗎🥸", "likes": 883, "replies": 282, "url": "https://www.threads.com/@joey_wang.16/post/DYgx44tkatX", "top_comments": [], "engagement": 1165, "category": "求助請益"}, {"id": "ts_1780116907_391", "author": "2026-5-18", "handle": "7_.5201", "date": "2026-05-18", "timestamp": 1780116907, "text": "2026-5-18\n在520前被分手也是真的很慘", "likes": 1074, "replies": 76, "url": "https://www.threads.com/@7_.5201/post/DYfDDNjGmav", "top_comments": [], "engagement": 1150, "category": "其他"}],

const CHART_COLORS = ['#f5a0b5','#e8a87c','#b8a9c9','#d4c5a9','#a8c5c9','#c9b8a8','#d4b8c9'];

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
  });
});

// Punchlines
const punchlineContainer = document.getElementById('punchlineContainer');
DATA.punchlines.forEach(pl => {
  const div = document.createElement('div');
  div.className = 'punchline-card';
  div.innerHTML = `<div class="punchline-text">\u201c${pl.text}\u201d</div><div class="punchline-source">\u2014 ${pl.source} &middot; &#10084; ${pl.likes?.toLocaleString()}</div>`;
  punchlineContainer.appendChild(div);
});

// Topic horizontal bar chart
const dist = DATA.topicDistribution;
const sortedDist = Object.entries(dist).sort((a,b) => b[1] - a[1]);
new Chart(document.getElementById('topicBarChart'), {
  type: 'bar',
  data: {
    labels: sortedDist.map(([k]) => k),
    datasets: [{
      data: sortedDist.map(([,v]) => v),
      backgroundColor: ['#f5a0b5','#e8a87c','#b8a9c9','#d4c5a9','#a8c5c9','#c9b8a8','#d4b8c9'],
      borderRadius: 4,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:true, indexAxis:'y',
    plugins:{ legend:{ display:false } },
    scales:{
      x:{ grid:{ display:false }, ticks:{ display:false }, title:{ display:false } },
      y:{ grid:{ display:false }, title:{ display:false } }
    }
  }
});

// Likes bar chart
const sorted = [...DATA.posts].sort((a,b) => b.likes - a.likes).slice(0,10);
const labels = sorted.map(p => (p.author || '\u533f\u540d') + ' ' + (p.text||'').slice(0,15).replace(/\n/g,' ') + '\u22ef');
new Chart(document.getElementById('likesBarChart'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: '\u8b9a\u6578',
      data: sorted.map(p => p.likes),
      backgroundColor: '#f5a0b5',
      borderRadius: 4,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:true, indexAxis:'y',
    plugins:{ legend:{ display:false } },
    scales:{
      x:{ grid:{ display:false }, ticks:{ callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v } },
      y:{ grid:{ display:false }, title:{ display:false } }
    },
    layout:{ padding:{ right:40 } }
  }
});

// Topic summaries
const topicContainer = document.getElementById('topicContainer');
DATA.topicSummaries.forEach(s => {
  const div = document.createElement('div');
  div.className = 'topic-card';
  div.innerHTML = `<div class="topic-title">&#128204; ${s.topic} <span class="topic-meta">（${s.post_count} 則 · &#10084; ${s.total_likes?.toLocaleString()}）</span></div><div class="topic-summary">${s.summary}</div>`;
  topicContainer.appendChild(div);
});

// Filters
const filterContainer = document.getElementById('filterContainer');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = '全部';
allBtn.dataset.filter = 'all';
filterContainer.appendChild(allBtn);
const topics = [...new Set(DATA.posts.map(p => p.category || p.category_hint || '其他'))];
topics.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = t;
  btn.dataset.filter = t;
  filterContainer.appendChild(btn);
});

let currentFilter = 'all';
function renderPosts() {
  const filtered = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const container = document.getElementById('postListContainer');
  container.innerHTML = filtered.map((p,i) => `
    <div class="post-card">
      <h4>&#128100; ${p.author || '匿名'} <span class="meta">@${p.handle||''} &middot; ${p.date||''}</span></h4>
      <div class="text" onclick="this.classList.toggle('expanded')">${p.text}</div>
      <div class="stats">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies} &middot; ${p.category || p.category_hint || '未分類'}</div>
      ${p.url ? '<a class="post-url" href="' + p.url + '" target="_blank" rel="noopener">&#128279; 前往原文</a>' : ''}
    </div>
  `).join('');
  const sel = document.getElementById('postSelect');
  sel.innerHTML = filtered.map((p,i) => `<option value="${i}">&#10084;${p.likes} | ${p.author||'匿名'} | ${(p.text||'').slice(0,30)}...</option>`).join('');
  sel.onchange = () => showDetail(parseInt(sel.value));
}

filterContainer.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderPosts();
  });
});

function showDetail(idx) {
  const posts = currentFilter === 'all' ? DATA.posts : DATA.posts.filter(p => (p.category || p.category_hint || '其他') === currentFilter);
  const p = posts[idx];
  if (!p) return;
  const container = document.getElementById('detailContainer');
  let comments = '';
  (p.top_comments || []).forEach(c => {
    comments += `<div class="comment"><div class="comment-author">${c.author||'匿名'}</div><div>${c.text}</div><div style="font-size:0.75rem;color:#adb5bd;">&#10084; ${c.likes}</div></div>`;
  });
  container.innerHTML = `
    <div class="detail-container">
      <h3>&#128100; ${p.author||'匿名'} <span style="font-weight:400;color:#868e96;">@${p.handle||''}</span></h3>
      <div style="font-size:0.8rem;color:#868e96;">${p.date||''} &middot; ${p.category||p.category_hint||'未分類'}</div>
      <div class="text">${p.text}</div>
      <div style="color:#212529;font-size:0.9rem;">&#10084; ${p.likes?.toLocaleString()} &middot; &#128172; ${p.replies}</div>
      ${p.url ? '<a class="post-url" href="' + p.url + '" target="_blank" rel="noopener">&#128279; 前往 Threads 原文</a>' : ''}
      <div style="margin-top:0.8rem;font-weight:600;color:#212529;">&#128172; 熱門留言（前 ${(p.top_comments||[]).length} 則）</div>
      ${comments || '<div style="color:#adb5bd;">暫無留言資料</div>'}
    </div>
  `;
}

renderPosts();
showDetail(0);
</script>
